<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta charset="utf-8" />
  
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/stylelogin.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="overflow-x-hidden">

  <div class="bg-[#fffdf7] w-full min-h-screen flex">

    <!-- LEFT IMAGE -->
    <div class="hidden md:block w-1/2 h-screen">
      <img src="img/Bg sayur.png" class="w-full h-full object-cover" />
    </div>

    <!-- RIGHT CONTENT -->
    <div class="w-full md:w-1/2 flex flex-col justify-center items-center px-6">

      <!-- LOGO -->
      <div class="absolute top-5 left-5 flex items-center gap-2">
        <img src="img/logo.png" class="w-[79px]" />
        <img src="img/tekslogo.png" class="w-[328px]" />
      </div>

      <div class="w-full max-w-[500px] flex flex-col gap-8">

        <!-- HEADER -->
        <div class="text-center">
          <h1 class="text-3xl font-bold">Login</h1>
          <p class="text-gray-600">Masuk ke akun anda untuk melanjutkan</p>
        </div>

        <!-- FORM -->
        <div class="flex flex-col gap-5">

          <!-- EMAIL -->
          <div>
            <label>Email</label>
          <input id="email" type="email" placeholder="Email"
              class="w-full h-14 px-4 rounded-lg border border-gray-300"/>
          </div>

          <!-- PASSWORD -->
          <div>
            <label>Password</label>
            <input id="password" type="password" placeholder="Password"
              class="w-full h-14 px-4 rounded-lg border border-gray-300"/>
          </div>

          <!-- REMEMBER -->
          <div class="flex justify-between items-center text-sm">
            <label class="flex items-center gap-2">
              <input type="checkbox">
              Ingat saya
            </label>
            <a href="#" class="text-green-700">Lupa Password?</a>
          </div>

        </div>

        <!-- BUTTON -->
        <div class="flex flex-col gap-6">

          <button onclick="login()" class="h-14 bg-green-700 text-white rounded-full">
            Login
          </button>

          <!-- DIVIDER -->
          <div class="flex items-center gap-3">
            <div class="flex-1 h-[1px] bg-black"></div>
            <span>Atau</span>
            <div class="flex-1 h-[1px] bg-black"></div>
          </div>

          <!-- GOOGLE -->
          <button class="flex items-center justify-center gap-3 border rounded-full h-14">
            <img src="https://static.dezeen.com/uploads/2025/05/sq-google-g-logo-update_dezeen_2364_col_0.jpg" class="w-5">
            Continue with Google
          </button>

        </div>

        <!-- FOOTER -->
        <p class="text-center text-sm">
          Belum punya akun?
          <span onclick="window.location.href='register.html'" 
          class="text-green-700 cursor-pointer">
          Daftar Sekarang
          </span>
        </p>

      </div>

    </div>
  </div>
<script src="js/login.js"></script>
</body>
</html>
