<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agrovia - Detail Produk</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #FFFDF7;
      color: #232323;
      min-height: 100vh;
    }

    button {
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    img {
      max-width: 100%;
      display: block;
    }

    /* ── NAVBAR ── */
    .navbar {
      width: 100%;
      background: #EAC800;
      border-bottom: 1px solid #EAC800;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .navbar-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .nav-logo-icon-img {
      height: 44px;
      width: auto;
      display: block;
    }

    .nav-logo-text-img {
      height: 28px;
      width: auto;
      display: block;
    }

    .nav-search {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .nav-search-box {
      width: 100%;
      max-width: 450px;
      height: 44px;
      background: #FFFDF7;
      border-radius: 999px;
      border: 1px solid #9D9D9D;
      display: flex;
      align-items: center;
      padding-left: 18px;
      padding-right: 4px;
    }

    .nav-search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 13px;
      color: #232323;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .nav-search-box input::placeholder {
      color: #9D9D9D;
    }

    .nav-search-btn {
      background: #254E06;
      color: #fff;
      border: none;
      font-size: 13px;
      font-weight: 600;
      padding: 0 24px;
      height: 36px;
      border-radius: 999px;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .nav-search-btn:hover {
      background: #254E06;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .nav-icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #254E06;
      color: #FFFDF7;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .nav-icon-btn:hover {
      transform: scale(1.06);
    }

    .nav-icon-btn i {
      color: #FFFDF7;
      width: 18px;
      height: 18px;
    }

    .nav-masuk {
      height: 40px;
      padding: 0 22px;
      border-radius: 10px;
      border: 1px solid #60A030;
      background: #F8FFF3;
      color: #60A030;
      font-weight: 600;
      font-size: 13px;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .nav-masuk:hover {
      background: #dfe7ca;
    }

    .nav-daftar {
      height: 40px;
      padding: 0 22px;
      border-radius: 10px;
      background: #254E06;
      color: #FEFFED;
      border: none;
      font-weight: 600;
      font-size: 13px;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .nav-daftar:hover {
      background: #244807;
    }

    /* ── DETAIL LAYOUT ── */
    .detail-wrap {
      display: grid;
      grid-template-columns: 50% 50%;
      min-height: calc(100vh - 68px);
    }

    /* LEFT */
    .img-panel {
      background: #7E8407;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px 32px;
      gap: 24px;
      position: relative;
      overflow: hidden;
    }

    .img-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 60%, rgba(255, 255, 255, 0.06), transparent 60%);
      pointer-events: none;
    }

    .img-wrap {
      position: relative;
      width: 100%;
      max-width: 520px;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .prod-img {
      width: 85%;
      height: 85%;
      object-fit: contain;
      filter: drop-shadow(0 24px 40px rgba(0, 0, 0, 0.35));
      transition: transform 0.5s, filter 0.5s;
      animation: floatIn 0.7s both;
    }

    .prod-img:hover {
      transform: scale(1.04) translateY(-6px);
      filter: drop-shadow(0 32px 52px rgba(0, 0, 0, 0.40));
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* RIGHT */
    .info-panel {
      background: #FEFFED;
      padding: 64px 68px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      animation: slideIn 0.55s both;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(24px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .prod-name {
      font-size: 3rem;
      font-weight: 800;
      color: #232323;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .prod-desc {
      font-size: 0.94rem;
      color: #232323;
      line-height: 1.75;
      max-width: 520px;
      margin-bottom: 24px;
    }

    .badge-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1.5px solid;
      transition: transform 0.2s;
    }

    .badge:hover {
      transform: translateY(-2px);
    }

    .badge-g {
      color: #407717;
      background: #D3FFB2;
      border-color: #407717;
    }

    .badge-y {
      color: #705F00;
      background: #FAFF95;
      border-color: #A6AD1A;
    }

    .badge i {
      width: 15px;
      height: 15px;
    }

    .price-block {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 28px;
    }

    .price-main {
      font-size: 2.8rem;
      font-weight: 800;
      color: #232323;
      letter-spacing: -1px;
      line-height: 1;
    }

    .price-unit {
      font-size: 1.2rem;
      font-weight: 500;
      color: #232323;
    }

    .qty-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 36px;
    }

    .qty-label {
      font-size: 0.88rem;
      font-weight: 600;
      color: #3a3a3a;
    }

    .qty-ctrl {
      display: flex;
      align-items: center;
      border: 1.5px solid #ddd;
      border-radius: 999px;
      overflow: hidden;
      background: #fff;
    }

    .qty-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: #1a1a1a;
      transition: background 0.2s;
      font-size: 18px;
    }

    .qty-btn:hover {
      background: #D8F3DC;
      color: #2D6A4F;
    }

    .qty-val {
      min-width: 40px;
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      user-select: none;
    }

    .action-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn-cart {
      flex: 1;
      min-width: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 999px;
      padding: 5px 60px;
      font-size: 0.8rem;
      font-weight: 500;
      background: #2E5A09;
      color: #fff;
      border: none;
      box-shadow: 0 6px 20px rgba(46, 90, 9, 0.28);
      transition: all 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .btn-cart:hover {
      background: #3B7210;
      transform: translateY(-2px);
    }

    .btn-checkout {
      flex: 1;
      min-width: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 999px;
      padding: 10px 60px;
      font-size: 0.8rem;
      font-weight: 500;
      background: #254E06;
      color: #FFFDF7;
      border: none;
      box-shadow: 0 6px 20px rgba(26, 58, 42, 0.22);
      transition: all 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .btn-checkout:hover {
      background: #254E06;
      transform: translateY(-2px);
    }

    .action-row button i {
      width: 20px;
      height: 20px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #254E06;
      color: #FFFDF7;
      padding: 13px 22px;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 600;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.15);
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: all 0.3s;
      z-index: 999;
      max-width: 320px;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .detail-wrap {
        grid-template-columns: 1fr;
        grid-template-rows: 45vh auto;
      }

      .img-panel {
        padding: 28px 20px 16px;
      }

      .info-panel {
        padding: 28px 20px 40px;
      }

      .prod-name {
        font-size: 2rem;
      }

      .price-main {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="nav-logo" onclick="location.href='index.html'">
        <img src="logo.png" alt="" class="nav-logo-icon-img" />
        <img src="tekslogo.png" alt="" class="nav-logo-text-img" />
      </div>
      <div class="nav-search">
        <div class="nav-search-box">
          <input type="text" placeholder="Search" />
          <button class="nav-search-btn">Search</button>
        </div>
      </div>
      <div class="nav-actions">
        <button class="nav-icon-btn" title="Pesanan"><i data-lucide="package-2"></i></button>
        <button class="nav-icon-btn" title="Keranjang" onclick="location.href='cart.html'"><i data-lucide="shopping-cart"></i></button>
        <button class="nav-masuk">Masuk</button>
        <button class="nav-daftar">Daftar</button>
      </div>
    </div>
  </nav>

  <!-- DETAIL -->
  <main class="detail-wrap">
    <div class="img-panel">
      <div class="img-wrap">
        <img class="prod-img" id="product-image" src="" alt="Produk" />
      </div>
    </div>
    <div class="info-panel">
      <h1 class="prod-name" id="product-name">—</h1>
      <p class="prod-desc" id="product-desc">—</p>
      <div class="badge-row">
        <span class="badge badge-g"><i data-lucide="shield-check"></i> Segar Setiap Hari</span>
        <span class="badge badge-y"><i data-lucide="sun"></i> Kualitas Terjamin</span>
      </div>
      <div class="price-block">
        <span class="price-main" id="product-price">—</span>
        <span class="price-unit" id="product-unit">/ gram</span>
      </div>
      <div class="qty-row">
        <span class="qty-label">Jumlah</span>
        <div class="qty-ctrl">
          <button class="qty-btn" id="minusBtn" onclick="changeQty(-1)"><i data-lucide="minus"></i></button>
          <span class="qty-val" id="qtyVal">1</span>
          <button class="qty-btn" onclick="changeQty(1)"><i data-lucide="plus"></i></button>
        </div>
      </div>
      <div class="action-row">
        <button class="btn-cart" onclick="addToCart()"><i data-lucide="shopping-cart"></i> Tambahkan ke Keranjang</button>
        <button class="btn-checkout" onclick="checkout()"><i data-lucide="shopping-bag"></i> Checkout</button>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    // DATA PRODUK
    const products = [
      {
        id: "buncis",
        name: "Buncis",
        description: "Buncis segar berkualitas tinggi dengan tekstur renyah dan rasa alami yang lezat. Cocok untuk berbagai masakan sehat karena kaya akan serat, vitamin, dan nutrisi harian.",
        price: 10000,
        unit: "gram",
        image: "buncis.png",
        weights: [500, 1000, 2000]
      },
      {
        id: "cabai-merah",
        name: "Cabai Merah",
        description: "Cabai merah segar dengan tingkat kepedasan tinggi dan aroma khas, cocok untuk berbagai masakan nusantara.",
        price: 25000,
        unit: "kg",
        image: "cb mrh.png",
        weights: [500, 1000, 2000]
      },
      {
        id: "bawang-merah",
        name: "Bawang Merah",
        description: "Bawang merah berkualitas tinggi dengan aroma kuat dan rasa manis alami untuk bumbu masakan.",
        price: 18000,
        unit: "kg",
        image: "bwg mrh.png",
        weights: [500, 1000, 2000]
      },
      {
        id: "wortel",
        name: "Wortel",
        description: "Wortel segar kaya vitamin A dengan rasa manis alami dan tekstur renyah.",
        price: 12000,
        unit: "kg",
        image: "wortel.png",
        weights: [500, 1000, 2000]
      },
      {
        id: "bawang-putih",
        name: "Bawang Putih",
        description: "Bawang putih segar dengan aroma kuat, sangat penting sebagai bumbu dasar masakan.",
        price: 28000,
        unit: "kg",
        image: "bwg pth.png",
        weights: [500, 1000, 2000]
      },
      {
        id: "tomat",
        name: "Tomat",
        description: "Tomat segar dengan rasa asam manis alami, cocok untuk masakan maupun jus sehat.",
        price: 15000,
        unit: "kg",
        image: "tomat.png",
        weights: [500, 1000, 2000]
      }
    ];

    // GET PRODUCT FROM URL
    const params = new URLSearchParams(location.search);
    const productId = params.get('id') || 'buncis';
    const product = products.find(p => p.id === productId) || products[0];

    // RENDER
    document.getElementById('product-name').textContent = product.name;
    document.getElementById('product-desc').textContent = product.description;
    document.getElementById('product-price').textContent = 'Rp ' + product.price.toLocaleString('id-ID');
    document.getElementById('product-unit').textContent = '/ ' + product.unit;
    document.getElementById('product-image').src = product.image;
    document.getElementById('product-image').alt = product.name;

    // QTY
    let qty = 1;

    function changeQty(d) {
      qty = Math.max(1, qty + d);
      document.getElementById('qtyVal').textContent = qty;
      const mb = document.getElementById('minusBtn');
      mb.style.opacity = qty <= 1 ? '0.35' : '1';
      mb.style.pointerEvents = qty <= 1 ? 'none' : 'auto';
      animPop(document.getElementById('qtyVal'));
    }

    function animPop(el) {
      el.style.transform = 'scale(1.3)';
      el.style.transition = 'transform 0.15s';
      setTimeout(() => el.style.transform = 'scale(1)', 150);
    }

    // CART
    let cart = JSON.parse(localStorage.getItem('agrovia_cart') || '[]');

    function saveCart() {
      localStorage.setItem('agrovia_cart', JSON.stringify(cart));
    }

    function addToCart() {
      const ex = cart.find(x => x.id === product.id);
      if (ex) {
        ex.qty += qty;
      } else {
        cart.push({ ...product, qty, selectedWeight: product.weights[0] });
      }
      saveCart();
      showToast(`✓ ${qty}× ${product.name} ditambahkan ke keranjang`);
      const b = document.querySelector('.btn-cart');
      b.style.transform = 'scale(0.95)';
      setTimeout(() => b.style.transform = '', 150);
    }

    function checkout() {
      addToCart();
      setTimeout(() => location.href = 'cart.html', 400);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    lucide.createIcons();
    changeQty(0);
  </script>

</body>
</html>
