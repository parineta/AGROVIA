<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>AturStok</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    body{
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f7f8f5;
    }

    .card-shadow{
      box-shadow: 0 4px 12px rgba(45,90,39,0.06);
    }

    .primary{
      background: #254e06;
    }

    .primary-text{
      color: #154212;
    }

    .soft-border{
      border: 1px solid #edf0ea;
    }
  </style>
</head>

<body>

<div class="min-h-screen flex flex-col">

  <!-- NAVBAR -->
   <div
      id="navbarSellerMode-container"
      class="fixed top-0 left-0 w-full z-50"
    ></div>

  <!-- CONTENT -->
  <main class="flex-1 flex items-center justify-center w-full px-6 pt-32 pb-8 space-y-8">
  <div class="flex flex-col w-[686px] items-start gap-4 p-4">
    <div class="relative">

    <a href="DashboardSellerMode.html"
      class="absolute top-4 left-4 z-10 bg-white/90 hover:bg-white text-[#173809] p-3 rounded-full shadow-md transition">
      <i data-lucide="arrow-left" class="w-6 h-6"></i>
    </a>

      <img
        id="productImage"
        class="w-full aspect-[1.5] object-cover rounded-2xl"
      />
    </div>

    <div class="flex flex-col gap-6 w-full">

      <!-- TITLE + STOCK -->
      <div class="flex items-end gap-[66px] w-full">

        <div>
          <div
            id="productName"
            class="text-[32px] font-bold text-[#1b1c17]"
          ></div>

          <p
            id="productDesc"
            class="text-base text-[#43493e]"
          ></p>
        </div>

        <div class="text-right">
          <div class="text-xs font-bold text-[#7d562d] tracking-[0.6px]">
            STOK SAAT INI
          </div>

          <div
            id="currentStockTop"
            class="text-[32px] font-bold text-[#173809]"
          ></div>
        </div>

      </div>

<!-- STOCK CONTROL -->
<div class="flex items-center justify-between bg-[#dbe8cf] border border-[#b8c8a7] rounded-xl px-8 py-4 w-full">

  <!-- MINUS -->
  <button
    id="decreaseBtn"
    class="w-14 h-14 rounded-full bg-[#2f6400] text-white flex items-center justify-center shrink-0 hover:scale-105 transition"
  >
    <i data-lucide="minus" class="w-7 h-7 stroke-[3]"></i>
  </button>

  <!-- CENTER -->
  <div class="flex flex-col items-center justify-center">
    
    <div class="text-xs font-bold text-[#43493e] mb-1 tracking-wide">
      UBAH STOK
    </div>

    <div class="w-36 py-2 bg-[#fbf9f1] border-2 border-[#55752c] rounded-md flex items-center justify-center">
      <div
        id="currentStock"
        class="text-[32px] font-bold text-[#173809]"
      ></div>
    </div>

  </div>

  <!-- PLUS -->
  <button
    id="increaseBtn"
    class="w-14 h-14 rounded-full bg-[#2f6400] text-white flex items-center justify-center shrink-0 hover:scale-105 transition"
  >
    <i data-lucide="plus" class="w-7 h-7 stroke-[3]"></i>
  </button>
  
</div>
</div>

<button id="saveBtn" class="w-full primary text-white rounded-3xl p-6 flex items-center justify-center gap-4 text-2xl font-semibold hover:scale-[1.01] transition">
  Simpan
</button>
</div>
<script>
lucide.createIcons();
fetch('component/navbarSellerMode.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('navbarSellerMode-container').innerHTML = data;

    lucide.createIcons(); 
  });

  const products = {
    buncis: {
      name: "Buncis",
      image: "https://www.bibitbenih.com/wp-content/uploads/2023/05/budidaya-buncis-1024x976.jpg",
      desc: "Lancarkan pencernaanmu juga. (Tinggi serat, bebas sembelit)",
      stock: 40,
      unit: "kg"
    },

    wortel: {
      name: "Wortel",
      image: "https://www.siaranindonesia.com/data/uploads/2022/09/images-24.jpeg",
      desc: "Baik untuk kesehatan mata dan kaya vitamin A.",
      stock: 40,
      unit: "kg"
    },

    tomat: {
      name: "Tomat",
      image: "https://cdn.pixabay.com/photo/2022/09/05/09/50/tomatoes-7433786_1280.jpg",
      desc: "Segar dan kaya antioksidan alami.",
      stock: 50,
      unit: "kg"
    },

    cabai: {
      name: "Cabai",
      image: "https://unair.ac.id/wp-content/uploads/2021/10/Foto-oleh-The-Sport-Review.jpg",
      desc: "Pedas segar untuk pelengkap masakan harian.",
      stock: 30,
      unit: "kg"
    }
  };

const params = new URLSearchParams(window.location.search);

const selectedProduct =
  params.get("product") || "buncis";

const product =
  products[selectedProduct] || products["buncis"];

console.log(selectedProduct);
console.log(product);

document.getElementById("productImage").src = product.image;

document.getElementById("productName").innerText =
  product.name;

document.getElementById("productDesc").innerText =
  product.desc;

let stock = product.stock;

const currentStock =
  document.getElementById("currentStock");

const increaseBtn =
  document.getElementById("increaseBtn");

const decreaseBtn =
  document.getElementById("decreaseBtn");

function updateStock() {

  currentStock.innerText =
    `${stock} ${product.unit}`;

  document.getElementById("currentStockTop").innerText =
    `${stock} ${product.unit}`;
}

updateStock();

increaseBtn.addEventListener("click", () => {
  stock++;
  updateStock();
});

decreaseBtn.addEventListener("click", () => {
  if (stock > 0) {
    stock--;
    updateStock();
  }
});
  document.getElementById("saveBtn").addEventListener("click", () => {

  let allStock = JSON.parse(localStorage.getItem("allStock")) || {};

  allStock[selectedProduct] = stock;

  localStorage.setItem("allStock", JSON.stringify(allStock));

  alert("Stok berhasil disimpan!");
  window.location.href = "DashboardSellerMode.html";
});

document.getElementById("saveBtn").addEventListener("click", () => {
  const updatedData = {
    product: selectedProduct,
    stock: stock
  };

  localStorage.setItem("updatedStock", JSON.stringify(updatedData));

  alert("Stok berhasil disimpan!");
  window.location.href = "DashboardSellerMode.html";
});
  </script>
</body>
</html>
